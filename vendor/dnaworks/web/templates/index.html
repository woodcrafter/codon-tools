<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DNAWorks 控制台</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="layout">
    <header class="topbar">
      <h1>DNAWorks 实验室仪表盘</h1>
      <p>一键提交任务，实时查看优化进度和输出结果。</p>
    </header>

    <section class="panel">
      <h2>输入参数</h2>
      <p class="hint">可直接修改 `DNAWORKS.inp` 内容后运行。</p>
      <textarea id="inputText" spellcheck="false">{{ default_input }}</textarea>
      <div class="actions">
        <button id="runBtn" class="btn primary">运行 DNAWorks</button>
        <button id="downloadBtn" class="btn" disabled>下载 LOGFILE</button>
        <span id="statusBadge" class="badge idle">空闲</span>
      </div>
    </section>

    <section class="panel">
      <h2>运行日志</h2>
      <pre id="logView">等待任务...</pre>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
