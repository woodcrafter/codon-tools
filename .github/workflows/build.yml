name: Build and Release Electron Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Install gfortran
        run: |
          if ! command -v gfortran &> /dev/null; then
            brew install gcc
          fi
          gfortran --version

      - name: Compile DNAWorks (macOS)
        run: |
          cd vendor/dnaworks
          make clean
          make
          mkdir -p ../../bin
          cp dnaworks ../../bin/dnaworks-mac
          chmod +x ../../bin/dnaworks-mac
          ls -la ../../bin/dnaworks-mac

      - name: Build frontend
        run: npx vite build

      - name: Build Electron main process
        run: |
          npx esbuild electron/main.ts --platform=node --bundle --format=esm --outdir=dist-electron \
            --external:electron --external:dotenv --external:express --external:multer \
            --external:@electric-sql/pglite --external:drizzle-orm --external:seqparse \
            --external:superjson --external:zod --external:nanoid --external:jose \
            --external:@trpc/server
          npx esbuild electron/preload.ts --platform=node --bundle --format=esm --outdir=dist-electron --external:electron

      - name: Build macOS dmg
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Setup MSYS2 (MinGW)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make

      - name: Compile DNAWorks (Windows)
        shell: msys2 {0}
        run: |
          cd vendor/dnaworks
          mingw32-make clean
          mingw32-make FC=x86_64-w64-mingw32-gfortran
          mkdir -p ../../bin
          cp dnaworks.exe ../../bin/dnaworks-win.exe
          ls -la ../../bin/dnaworks-win.exe

      - name: Build frontend
        run: npx vite build

      - name: Build Electron main process
        shell: bash
        run: |
          npx esbuild electron/main.ts --platform=node --bundle --format=esm --outdir=dist-electron \
            --external:electron --external:dotenv --external:express --external:multer \
            --external:@electric-sql/pglite --external:drizzle-orm --external:seqparse \
            --external:superjson --external:zod --external:nanoid --external:jose \
            --external:@trpc/server
          npx esbuild electron/preload.ts --platform=node --bundle --format=esm --outdir=dist-electron --external:electron

      - name: Build Windows exe
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/*.exe

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
