name: Build and Release Electron Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Install gfortran
        run: |
          if ! command -v gfortran &> /dev/null; then
            brew install gcc
          fi
          gfortran --version

      - name: Compile DNAWorks (macOS)
        run: |
          cd vendor/dnaworks
          make clean
          make
          mkdir -p ../../bin
          cp dnaworks ../../bin/dnaworks-mac
          chmod +x ../../bin/dnaworks-mac
          ls -la ../../bin/dnaworks-mac

      - name: Build frontend
        run: npx vite build

      - name: Build Electron main process
        run: |
          npx esbuild electron/main.ts --platform=node --bundle --format=esm --outdir=dist-electron \
            --external:electron --external:dotenv --external:express --external:multer \
            --external:@electric-sql/pglite --external:drizzle-orm --external:seqparse \
            --external:superjson --external:zod --external:nanoid --external:jose \
            --external:@trpc/server
          npx esbuild electron/preload.ts --platform=node --bundle --format=esm --outdir=dist-electron --external:electron

      - name: Build macOS dmg
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Setup MSYS2 (MinGW)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make

      - name: Compile DNAWorks (Windows)
        shell: msys2 {0}
        run: |
          cd vendor/dnaworks
          mingw32-make clean
          # Fully static link so the exe carries libgfortran, libgcc, libquadmath
          # AND libwinpthread. -static-lib{gfortran,gcc} alone still leave a dynamic
          # dependency on libwinpthread-1.dll, which is absent when the portable app
          # extracts to a temp dir -> STATUS_DLL_NOT_FOUND (0xc0000135) at launch.
          mingw32-make FC=x86_64-w64-mingw32-gfortran \
            FCFLAGS="-g -fbounds-check -O2 -static -static-libgfortran -static-libgcc" \
            FLFLAGS="-g"
          mkdir -p ../../bin
          cp dnaworks.exe ../../bin/dnaworks-win.exe
          ls -la ../../bin/dnaworks-win.exe

      - name: Verify DNAWorks is fully static
        shell: msys2 {0}
        run: |
          cd vendor/dnaworks
          echo "=== DLL dependencies ==="
          objdump -p dnaworks.exe | grep -i 'DLL Name' || true
          # Fail the build if any MinGW runtime DLL is still dynamically linked.
          if objdump -p dnaworks.exe | grep -iE 'DLL Name:\s+(libgfortran|libgcc|libquadmath|libwinpthread|libstdc)'; then
            echo "ERROR: dnaworks.exe still depends on a MinGW runtime DLL; static link failed." >&2
            exit 1
          fi
          echo "=== Smoke test: run a minimal job end-to-end ==="
          # Mirrors server buildInputTemplate(); proves the exe launches (no DLL
          # load failure) and completes a real optimization on Windows.
          printf '%s\n' \
            'title "CI_SMOKE_TEST"' \
            'logfile "LOGFILE.txt"' \
            'timelimit 5' \
            'solutions 1' \
            'NUCLEOTIDE' \
            'ATGGCTAGCAAAGGTGAAGAACTGTTCACCGGTGTTGTTCCGATTCTGGTTGAACTGGATGGTGATGTTAACGGTCATAAATTC' \
            '//' \
            > smoke.inp
          ./dnaworks.exe smoke.inp 2>&1 | tee run.log && rc=0 || rc=$?
          echo "Smoke test exit code: $rc"
          # LOGFILE.txt is opened at startup, so its existence alone does NOT prove
          # success. Gate on the absence of a Fortran runtime error AND the presence
          # of a real optimized sequence in the logfile.
          if grep -qiE 'runtime error|Error termination|Backtrace' run.log; then
            echo "ERROR: dnaworks.exe hit a Fortran runtime error during optimization." >&2
            exit 1
          fi
          if ! grep -qi 'THE DNA SEQUENCE' LOGFILE.txt; then
            echo "ERROR: LOGFILE.txt contains no optimized sequence; run did not complete (exit $rc)." >&2
            exit 1
          fi
          echo "Smoke test OK: optimization completed and emitted a DNA sequence"

      - name: Build frontend
        run: npx vite build

      - name: Build Electron main process
        shell: bash
        run: |
          npx esbuild electron/main.ts --platform=node --bundle --format=esm --outdir=dist-electron \
            --external:electron --external:dotenv --external:express --external:multer \
            --external:@electric-sql/pglite --external:drizzle-orm --external:seqparse \
            --external:superjson --external:zod --external:nanoid --external:jose \
            --external:@trpc/server
          npx esbuild electron/preload.ts --platform=node --bundle --format=esm --outdir=dist-electron --external:electron

      - name: Build Windows exe
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/*.exe

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
